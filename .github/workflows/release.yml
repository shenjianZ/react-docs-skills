name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate skills
      run: npm run validate

    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      id: changelog
      run: |
        # 获取上一个标签
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        # 生成变更日志
        if [ -z "$PREV_TAG" ]; then
          BODY=$(cat << 'ENDOFBODY'
## 🎉 首次发布

这是 React Docs UI Skills 的第一个正式版本！

## 📦 包含的 Skills

- **react-docs-ui-config** - 配置编写技能
- **react-docs-ui-doc-authoring** - 文档编写技能
- **react-docs-ui-scaffold** - 脚手架使用技能

## 🚀 快速开始

\`\`\`bash
git clone https://github.com/shenjianZ/react-docs-skills.git
cd react-docs-skills
\`\`\`

## 📖 文档

- [使用指南](https://github.com/shenjianZ/react-docs-skills/blob/master/docs/USAGE.md)
- [开发指南](https://github.com/shenjianZ/react-docs-skills/blob/master/docs/DEVELOPMENT.md)
- [贡献指南](https://github.com/shenjianZ/react-docs-skills/blob/master/CONTRIBUTING.md)
ENDOFBODY
)
        else
          BODY=$(cat << 'ENDOFBODY'
## 📝 变更内容

\`\`\`bash
git log ${PREV_TAG}..${{ steps.get_version.outputs.version }} --pretty=format:"- %s" --no-merges
\`\`\`

## 🔗 完整变更日志

查看完整提交记录：[${PREV_TAG}...${{ steps.get_version.outputs.version }}](https://github.com/shenjianZ/react-docs-skills/compare/${PREV_TAG}...${{ steps.get_version.outputs.version }})
ENDOFBODY
)
        fi
        
        # 将多行内容转换为单行并输出
        BODY=$(echo "$BODY" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
        echo "body=${BODY}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        body: ${{ steps.changelog.outputs.body }}
        draft: false
        prerelease: false