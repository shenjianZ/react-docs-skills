name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate skills
      run: npm run validate

    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      id: changelog
      run: |
        # 获取上一个标签
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        # 创建临时文件
        echo '## 🎉 首次发布' > /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '这是 React Docs UI Skills 的第一个正式版本！' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '## 📦 包含的 Skills' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '- **react-docs-ui-config** - 配置编写技能' >> /tmp/changelog.txt
        echo '- **react-docs-ui-doc-authoring** - 文档编写技能' >> /tmp/changelog.txt
        echo '- **react-docs-ui-scaffold** - 脚手架使用技能' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '## 🚀 快速开始' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '```bash' >> /tmp/changelog.txt
        echo 'git clone https://github.com/shenjianZ/react-docs-skills.git' >> /tmp/changelog.txt
        echo 'cd react-docs-skills' >> /tmp/changelog.txt
        echo '```' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '## 📖 文档' >> /tmp/changelog.txt
        echo '' >> /tmp/changelog.txt
        echo '- [使用指南](https://github.com/shenjianZ/react-docs-skills/blob/master/docs/USAGE.md)' >> /tmp/changelog.txt
        echo '- [开发指南](https://github.com/shenjianZ/react-docs-skills/blob/master/docs/DEVELOPMENT.md)' >> /tmp/changelog.txt
        echo '- [贡献指南](https://github.com/shenjianZ/react-docs-skills/blob/master/CONTRIBUTING.md)' >> /tmp/changelog.txt
        
        # 读取文件内容并处理换行
        BODY=$(cat /tmp/changelog.txt | awk '{printf "%s\n", $0}' | sed 's/\\n$//')
        echo "body=${BODY}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        body: ${{ steps.changelog.outputs.body }}
        draft: false
        prerelease: false